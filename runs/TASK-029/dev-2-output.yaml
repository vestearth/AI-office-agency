next_action:
  agent: reviewer
  reason: The landed producer seams, Order spend emission path, and contract tests are ready for review; reviewer should confirm the documented missing turnover and Game settlement hooks are handled as blockers rather than accidental scope gaps.
blockers:
  - Games-Labs-Order does not currently expose a settled gameplay-turnover finalization path inside the scoped service, so `turnover.settled` / `turnover.reversed` could not be wired safely without inventing a non-existent owner hook.
  - Games-Labs-Game does not currently expose any persisted round-settlement or rollback transition in scope; the canonical round publisher helpers/tests are ready, but runtime emission still needs the actual owning settlement path before the task can be considered fully end-to-end complete.
