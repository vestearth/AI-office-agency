summary: |
  TASK-018 implementation is complete and correct. All acceptance criteria are met.

  Ownership enforcement:
  - RedeemPoints() in level_service.go exclusively delegates to wallet.Client.RedeemPoints()
    with a structured reason ("missions_reward_claim") and idempotency key. No local
    Points/TotalPoints mutation occurs on the redemption path. ✅
  - Local progression fields (Points, TotalPoints) are touched only by AddTurnover()
    and BuyLevel() — neither of which is a redemption flow. ✅
  - No cross-service DB access introduced. ✅

  Idempotency:
  - Caller-supplied idempotency_key is forwarded via both the JSON body and
    Idempotency-Key HTTP header to Wallet. ✅
  - When caller omits the key, a 16-byte crypto/rand hex string is auto-generated
    so every request has a unique key sent to Wallet. ✅

  Error mapping (handler):
  - ErrInsufficientPoints  → 402 Payment Required ✅
  - ErrWalletServiceUnavailable → 503 Service Unavailable ✅
  - All other errors → 400 Bad Request ✅

  Observability:
  - slog.InfoContext / slog.ErrorContext structured events: redeem_points_attempt,
    redeem_points_success, redeem_points_failed — all carrying user_id, points,
    idempotency_key, reason. Confirmed in test stdout. ✅
  - Three atomic int64 counters (redeemAttempts, redeemSuccess, redeemFail) on
    LevelService; exposed via RedeemMetrics() for scraping/alerting. ✅

  go.mod: no replace directive; shared-lib at v0.0.0-20260409063216-d50cd0168de4. ✅

  Tests — all 15 pass (verified with verbose run):
  Services (11 total, 7 new/updated):
    PASS TestLevelServiceRedeemPointsDoesNotMutateProgression
    PASS TestLevelServiceAddTurnoverDoesNotCallWalletEndpoints
    PASS TestLevelServiceRedeemPointsIdempotencyKeyForwarded
    PASS TestLevelServiceRedeemPointsAutoGeneratesKeyWhenEmpty
    PASS TestLevelServiceRedeemPointsInsufficientPointsError
    PASS TestLevelServiceRedeemPointsWalletUnavailable
    PASS TestLevelServiceRedeemPointsMetricsTracked
    PASS TestClaimMonthlyReward_UsesConfiguredRewardAmount
    PASS TestStoreService* (4 existing; all pass)
  Handlers (4 new):
    PASS TestLevelHandlerRedeemSuccess
    PASS TestLevelHandlerRedeemInsufficientPoints
    PASS TestLevelHandlerRedeemWalletUnavailable
    PASS TestLevelHandlerRedeemIdempotencyKeyForwardedInBody

  Minor observations (non-blocking):
  1. The auto-generated idempotency key is per-request random, not deterministic
     from (user_id, points, timestamp). This means a client that retries on
     network timeout will generate a new key each time — potentially not matching
     the key Wallet already processed. The safer pattern is caller-supplied keys
     with a request_id from upstream. Advisory only; full saga/retry design is
     TASK-020 scope.
  2. redeemFail counter is incremented on level-gate failures (level < 5) and
     user-not-found — these are validation errors, not wallet failures. A future
     iteration could distinguish validation vs wallet error categories in metrics.
     Not blocking.
  3. No store_service redemption path exists yet; task.md listed
     store_service.go as in-scope only "if redemption is triggered from store
     paths". No such path found — no gap here. ✅

review_verdict: approved

