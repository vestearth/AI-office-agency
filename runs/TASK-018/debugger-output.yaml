summary: |
  Root cause was twofold in Missions redemption. First, `LevelService` minted a random
  fallback idempotency key when callers omitted one, which made timeout/retry flows
  nondeterministic and could turn the same logical redemption into a second Wallet
  debit. Second, observability only tracked aggregate counters and logged reward
  metadata, so the required stable `reason` field was not propagated through logs and
  metrics. The acceptance coverage also stopped at request forwarding and progression
  invariants, without asserting Wallet remained the authoritative spendable balance
  across a replay.

  I applied a focused fix in Missions only. Redemption now requires a caller-supplied
  idempotency key instead of generating a random fallback, and the HTTP handler rejects
  missing keys up front with a 400. The service now derives a stable redemption reason
  (`missions_reward_claim` or `missions_store_purchase`), sends that reason to Wallet,
  logs it with `user_id`, `idempotency_key`, and `wallet_reference`, and records
  attempt/success/fail counters by reason while keeping the aggregate counters intact.
  I also added regression coverage for the missing-key contract, for reason-based
  metrics, and for a replay scenario with a stateful Wallet test server that proves the
  Wallet balance only decrements once while Missions progression remains unchanged.

  I checked the current run iteration against the configured loop guard and it is still
  below the max (`iteration: 2`, `loop_guard.max_iterations: 8`), so this remains safe
  to route back to Reviewer.
