summary: |
  TASK-014 implementation is functionally correct and satisfies all acceptance
  criteria. Both services build clean and all tests pass.

  Core behavior verified:
  - `PackageTypeReward`, `PricePoints`, sentinel errors present in models.
  - `UserAdapter.GetUserLevel` implemented and covered by HTTP mock test.
  - `WalletAdapter.RedeemPoints` maps wallet 402 → `ErrInsufficientPoints`.
  - `CreateRewardOrder` enforces level >= 5 BEFORE any wallet call (test
    `TestCreateRewardOrderChecksLevelBeforeWallet` explicitly guards this).
  - `RewardPackage` is never called in the reward flow — verified by stub that
    fatals if invoked (`TestCreateRewardOrderRedeemsPointsAndCreatesConfirmedOrder`).
  - Order is created at `StatusPaymentConfirmed` with `Currency = "POINTS"`.
  - HTTP handler maps: 201 success / 402 insufficient points / 403 level < 5 /
    404 package not found / 409 duplicate idempotency key.
  - `POST /api/v1/orders/reward` registered in api-gateway under authenticated
    middleware BEFORE the `/*filepath` catch-all — routing is correct.
  - Migration `005_add_price_points_to_order_packages.sql` is correct.

  One warning-level issue found (non-blocking for approval):
  `CreateRewardOrder` returns an error on idempotent retry of a successful
  request, instead of the existing order. See artifacts section for detail.

review_verdict: approved

