artifacts:
  - path: Games-Labs-Order/internal/models/order.go
    issues: []

  - path: Games-Labs-Order/internal/core/ports/adapters.go
    issues: []

  - path: Games-Labs-Order/internal/adapter/useradt/useradt.go
    issues:
      - line: 29-71
        severity: suggestion
        description: >
          Only the happy-path (HTTP 200, level returned) is tested. Consider
          adding cases for: (a) HTTP 4xx/5xx from user service, (b) empty
          userID, (c) unconfigured baseURL. Not a blocker — the acceptance
          criterion ("mock-based unit test") is satisfied.

  - path: Games-Labs-Order/internal/adapter/walletadt/walletadt.go
    issues:
      - line: 159-204
        severity: suggestion
        description: >
          `RedeemPoints` has no dedicated test file (walletadt_test.go).
          The service-layer stub covers the contract indirectly, but an HTTP
          mock test (like useradt_test.go) for the 402 → ErrInsufficientPoints
          mapping would complete coverage. Not a blocker.

  - path: Games-Labs-Order/internal/core/services/ordersvc/service.go
    issues:
      - line: 228-234
        severity: warning
        description: >
          `CreateRewardOrder` idempotency retry behaviour is inconsistent with
          `CreateExchangeOrder`. When `GetByIdempotencyKey` finds an existing
          order the method returns `errors.New("idempotency_key already used")`
          (→ HTTP 409), whereas `CreateExchangeOrder` returns the existing
          order silently (→ HTTP 200/201). A client that retries a successful
          reward order will receive 409 instead of the existing order.

          The system is safe against double-spend because the wallet's
          `RedeemPoints` is itself idempotent on the same key. However, the
          API contract is broken for the retry case.

          Fix (recommended before v1 GA, not blocking for this review):
          Replace lines 232-234:
            existing, err := s.or.GetByIdempotencyKey(ctx, idempotencyKey)
            if err != nil { return nil, err }
            if existing != nil { return nil, errors.New("idempotency_key already used") }
          With:
            existing, err := s.or.GetByIdempotencyKey(ctx, idempotencyKey)
            if err != nil { return nil, err }
            if existing != nil { return existing, nil }
          And remove the `"idempotency_key already used"` case from the HTTP
          handler switch (http.go:177-179).

  - path: Games-Labs-Order/internal/core/handlers/orderhdl/http.go
    issues: []

  - path: Games-Labs-Order/cmd/main.go
    issues: []

  - path: Games-Labs-Order/migrations/005_add_price_points_to_order_packages.sql
    issues: []

  - path: api-gateway/gateway/http.go
    issues: []

