description: |
  This task finishes the producer side of Daily Activities v1 after TASK-032
  makes the missing runtime settlement hooks real. It preserves the already-
  landed Order spend producer behavior, then wires `turnover.*` and `round.*`
  emission only to verified final-state owner transitions. The contract remains
  frozen in `shared-lib`, and no speculative request-time or helper-only
  producer triggers are allowed.

acceptance_criteria:
  - criterion: "Producer payloads published from Games-Labs-Order and Games-Labs-Game match shared-lib/events/player_activity.go exactly, including topic/version constants and explicit reverse semantics."
  - criterion: "Games-Labs-Order preserves the existing final-state spend.settled and spend.reversed behavior and additionally emits turnover.settled / turnover.reversed only from verified final-state owner transitions delivered by TASK-032."
  - criterion: "Games-Labs-Game emits round.settled and round.reversed only from verified persisted settlement and rollback/correction transitions delivered by TASK-032."
  - criterion: "Promotional/free-spin activity remains explicitly flagged in emitted payloads for all producer paths in scope."
  - criterion: "Automated tests cover forward, reverse, promotional, and event-reference behavior for every producer path wired in scope."

plan:
  approach: |
    Use TASK-028 as the sole contract authority and TASK-032 as the runtime-
    owner prerequisite. Keep the already-landed publisher seam pattern, but
    attach it only to verified final-state turnover and round hooks. Preserve
    existing spend behavior where it is already correct, and do not broaden
    producer scope beyond contract-owned final transitions.
  subtasks:
    - order: 1
      description: "Reconcile the landed Order and Game producer seams against the final runtime hooks delivered by TASK-032."
      agent: dev-2
    - order: 2
      description: "Wire turnover.settled / turnover.reversed and round.settled / round.reversed only from verified final-state transitions, preserving shared-lib payload parity."
      agent: dev-2
    - order: 3
      description: "Expand focused producer tests so all in-scope producer families are covered for forward, reverse, promotional, and event-reference behavior."
      agent: dev-2
  risks:
    - risk: "TASK-032 may reveal that one or both owner transitions live outside current repo scope."
      mitigation: "Keep this task blocked until ownership is confirmed rather than reintroducing speculative producer triggers."
    - risk: "Existing Order spend behavior could regress while turnover and round wiring are added."
      mitigation: "Preserve spend tests and explicitly treat existing final-state spend emission as a non-regression requirement."
    - risk: "Producer payload drift may reappear between services."
      mitigation: "Treat shared-lib/events/player_activity.go as the only canonical contract and keep tests asserting parity."
  estimated_complexity: high

assignment:
  primary: dev-2
  parallel: false
  reason: "This remains cross-service producer integration work tied to contract parity and final-state runtime ownership."

summary: |
  TASK-033 is the downstream producer-completion task that follows TASK-032. It
  finishes turnover and round Daily Activities emission on top of verified
  runtime hooks while preserving the contract-frozen, final-state-only behavior
  required for Daily Activities v1.

