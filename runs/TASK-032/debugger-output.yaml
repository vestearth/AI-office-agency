summary: |
  The reviewer failure was caused by the Game service not owning any round state. `SettleRound` and `ReverseRound` were both thin wrappers over the same lookup helper, so reversal had nothing persisted to reverse from and both paths still depended on caller-supplied fields instead of a stored final state.

  I fixed that by adding a minimal persisted round lifecycle store in `Games-Labs-Game`, then wiring the service to own two distinct transitions. `SettleRound` now normalizes the lifecycle against the persisted game record and upserts a canonical settled row with `settled_at`. `ReverseRound` now loads that stored row first and only applies a reversal timestamp to the owned record, so the returned lifecycle carries the original settled user/game/promotional scope plus the new `reversed_at` transition time instead of echoing reversal input. I also updated the focused service tests to prove settlement persistence, reversal linkage from prior settled state, missing-settlement rejection, and idempotent already-reversed behavior.
