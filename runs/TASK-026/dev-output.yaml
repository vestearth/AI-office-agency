summary: |
  Refactored Missions daily-activity flow to use the database as the authoritative
  source for claim/progress/admin paths. Claim now resolves activity definitions
  from `daily_activities` and honors persisted `active`, `reward`, and `currency`.
  Progress now reads daily activities and totals from DB in repo-backed mode.
  Handler delete mapping was normalized to return 404 for missing rows and 500
  for non-not-found DB failures.
