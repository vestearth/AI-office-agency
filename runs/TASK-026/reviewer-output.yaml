summary: |
  TASK-026 — Use DB as Source of Truth for Missions Daily Activities. APPROVED.

  Build: PASS. Tests: PASS (handlers 1.028s, services 1.509s, repositories 0.566s).

  All acceptance criteria verified:

  1. Repository exposes full daily activity CRUD (list/get/upsert/delete) backed
     by the daily_activities table. ListDailyActivities, GetDailyActivityByID,
     UpsertDailyActivity, DeleteDailyActivity all confirmed at mission_repo.go:383-451.

  2. In-memory daily activity map eliminated.
     The MissionService struct has no dailyActivity map field.
     seedData() no longer seeds any daily activity entries — only tournament and badge
     mock data remain, which are out of scope.

  3. ClaimDailyMission resolves activity config from DB.
     GetDailyActivityByID called before reward computation. Inactive activity returns
     inactive_mission without wallet call. DB reward and currency override runtime config.
     Covered by TestClaimDailyMission_UsesDBActivityConfigAndActiveFlag (table-driven,
     2 subtests: inactive and active).

  4. GetProgress returns daily activities from DB.
     ListDailyActivities called on every progress request. dailyMissionTotal and
     watchAdDailyCount also sourced from DB when repo != nil.
     Covered by TestGetProgress_UsesDBDailyActivities.

  5. Admin operations persist through repo.
     SetDailyActivity → UpsertDailyActivity. DeleteDailyActivity → repo.DeleteDailyActivity.
     Both are thin passthroughs with no in-memory side effect.

  6. DELETE 404/500 mapping correct.
     Repo returns sql.ErrNoRows when RowsAffected == 0.
     Service passes error through unchanged.
     Handler uses errors.Is(err, sql.ErrNoRows) -> 404, else 500.
     Covered by TestDeleteDailyActivity_Returns404WhenNotFound and
     TestDeleteDailyActivity_Returns500WhenDatabaseFails (sqlmock-based).

  Minor observation (not a blocker):
    ClaimDailyMission and GetProgress still contain "repo == nil" in-memory fallback
    branches for dailyMissionTotal. These are pre-existing scaffolding guards and do
    not affect production behavior (repo is always set in cmd/main.go). No regression
    introduced. Not part of TASK-026 acceptance criteria.

review_verdict: approved

