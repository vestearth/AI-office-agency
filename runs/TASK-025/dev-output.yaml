  `docs/Games-Labs-APIs.postman_collection.json` now adds an `idempotency_key` variable, renames the Missions levels folder to EXP terminology, includes an EXP-based saved response example for the level endpoint, and updates the gateway redeem request to send `X-User-ID` and `Idempotency-Key` as headers while using the dynamic redemption payload (`points`, `reward_type`, `reward_key`, voucher metadata) without `user_id` or `idempotency_key` in the JSON body.

