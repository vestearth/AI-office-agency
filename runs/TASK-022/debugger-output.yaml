summary: |
  Root cause was a regression during the EXP terminology rename in Missions: previously approved redeem flow behavior was accidentally dropped while renaming progression fields.

  I restored the four error-severity items without touching the EXP rename itself:
  - Restored MissionResult wallet correlation output by re-adding wallet_reference.
  - Restored wallet client redeem contract from error-only to (walletReference, error).
  - Restored insufficient-points sentinel behavior (ErrInsufficientPoints) and HTTP 402 mapping in wallet client.
  - Restored deterministic idempotency threading for level redeem by generating/using missions:levels_redeem:<user_id>:<hex>, forwarding it through handler -> service -> wallet call, and validating this format in tests.

  I also restored structured logging in the redeem service path with user_id, idempotency_key, reason, and wallet_reference for both success and failure.

  Validation:
  - cd Games-Labs-Missions && go test ./... passed.
