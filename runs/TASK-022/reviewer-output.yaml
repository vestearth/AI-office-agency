summary: |
  TASK-022 iteration 4 — final review after debugger restoration.

  Build: PASS. Tests: 15/15 PASS (services: 8 level + 7 store, repositories: cached ok).

  All four round-1 regressions are confirmed restored:
  1. Idempotency key: when caller passes empty string, service auto-generates
     missions:levels_redeem:<user_id>:<hex> via crypto/rand. Provided key is
     forwarded verbatim. TestLevelServiceRedeemPointsAutoGeneratesKeyWhenEmpty and
     TestLevelServiceRedeemPointsIdempotencyKeyForwarded both pass.
  2. wallet.Client.RedeemPoints now returns (walletReference string, err error).
     HTTP 402 → ErrInsufficientPoints, 5xx → ErrWalletServiceUnavailable,
     wallet_reference/ledger_id parsed from JSON response body.
  3. MissionResult.WalletReference restored with json:"wallet_reference,omitempty".
     WalletReference populated as firstNonEmpty(walletRef, idempotencyKey).
  4. ErrInsufficientPoints sentinel and 402-check restored in client.

  Redeem path additionally restores: atomic redeemAttempts/redeemSuccess/redeemFail
  counters, slog structured logging with user_id/idempotency_key/reason/wallet_reference
  at attempt, success, and error sites. RedeemMetrics() accessor verified by test.
  Handler maps ErrInsufficientPoints→402, ErrWalletServiceUnavailable→503.

  EXP terminology note (advisory only):
  The debugger applied a hybrid EXP approach. UserLevel Go fields kept as Points/
  TotalPoints/NextLevelPoints (same JSON wire keys). LevelProgressResult now emits
  BOTH legacy fields (points_added, current_points json keys) AND new EXP aliases
  (exp_added, current_exp json keys) — additive, not breaking. LevelConfig similarly
  emits both points_per_level_step and exp_per_level_step. The core architectural
  intent — Wallet is sole owner of spendable points, Missions tracks progression EXP
  only — is fully expressed in code and API behavior. UserLevel identifier naming is
  an advisory for a follow-up cleanup pass.

  All TASK-022 acceptance criteria met. No error-severity issues.

