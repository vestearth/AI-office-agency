summary: |
  Missions already delegated level redeem spend to Wallet without mutating local progression; this pass completes TASK-022 gaps.
  Fixed Wallet points-ledger idempotency: lookups no longer hard-code reason=redeem_points (Missions sends missions_reward_claim), and redemption reference validation now matches any points deduction (points_delta < 0). Refund idempotency replay matches credits (points_delta > 0).
  Wallet RedeemPoints now returns the points ledger UUID; HTTP POST /wallets/redeem includes ledger_id and wallet_reference in the JSON body on success.
  Missions wallet client parses those fields; LevelService logs wallet_reference (ledger when present, else idempotency key), exposes wallet_reference on MissionResult, and auto-generates idempotency keys as missions:levels_redeem:<user_id>:<random>.
  Added WALLET_HTTP_TIMEOUT_SECONDS (via WalletHTTPTimeout) for Wallet HTTP client wiring and regression tests for key prefix, duplicate idempotency stability, and HTTP redeem response shape.
