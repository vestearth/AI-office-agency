summary: |
  Human reopened TASK-022: progression terminology still used “Points” internally instead of EXP.
  Renamed progression fields and logic in Games-Labs-Missions to EXP while keeping legacy JSON wire keys
  (e.g. json:"points", json:"points_added") so public API responses stay backward compatible.
  UserLevel: Exp, TotalExp, NextLevelExp; LevelProgressResult: ExpAdded, CurrentExp, ProgressExpAdded, CurrentProgressExp;
  LevelConfig: ExpPerLevelStep (JSON still points_per_level_step). LevelService uses calculateNextLevelExp and EXP-named locals/comments.
  GET /api/v1/levels/{id} now also emits progress_exp, lifetime_progress_exp, next_level_exp alongside existing progress_points aliases.
  DB column names (points, total_points, next_level_points) unchanged in level_repo SQL.
