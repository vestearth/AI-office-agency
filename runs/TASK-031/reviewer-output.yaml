summary: |
  TASK-031 acceptance criteria are fully satisfied. The Daily Activities v1
  specification in Games-Labs-Missions/README.md contains: a complete field matrix
  for all four v1 condition types with required/optional/hidden/read-only columns;
  ten explicit validation and mutual-exclusion rules; admin endpoint contracts and
  example payloads for create, update, list, activate/deactivate, and
  detail/inspection flows; user-facing progress/claim payload shapes including
  `can_claim`, `is_complete`, and `claimed` semantics; explicit exclusion list
  covering multi-condition AND logic, milestones, promotional-included activities,
  custom timezone/reset-hour, and currency other than THB for spend activities.
  The shared-lib proto was extended with AdminGetActivity, AdminUpdateActivity,
  AdminActivateActivity, AdminDeactivateActivity, and AdminDeleteActivity RPCs
  plus their typed messages, all regenerated. Legacy AdminUpsertActivity and
  AdminDeleteActivity (no-path) endpoints are preserved for backward compatibility.
  All go.mod files are clean (no forbidden replace directive). Build and tests
  pass across all three affected modules.
  One known forward-work item (acknowledged by dev-2 as out of scope): the
  Missions service handler layer still implements only the legacy upsert/delete
  surface; the new proto RPCs will need a downstream implementation task.
review_verdict: approved
