summary: |
  Aligned the Daily Activities v1 specification with the shared API contract by
  expanding `shared-lib/proto/missionspb/missions.proto` to include the
  approved admin detail, update, activate, and deactivate endpoints while
  preserving the legacy upsert/delete surface for backward compatibility.
  Regenerated the missions protobuf, grpc-gateway, and swagger artifacts so the
  shared contract now exposes the same HTTP surface documented in the Missions
  README. Also tightened the README admin endpoint summary so it no longer
  implies Daily Activities is only list/upsert/delete.
