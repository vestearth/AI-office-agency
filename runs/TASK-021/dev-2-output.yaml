summary: |
  Implemented TASK-021 with a centralized Wallet-owned rate catalog and integrated runtime consumption paths with safe fallback behavior.
  In Games-Labs-Wallet, I added a new migration-backed `rate_catalog` table with constraints, seeded parity exchange rates (`exchange.ex_5`, `exchange.ex_25`, `exchange.ex_100`), repository/service support for listing/get-by-key/upsert/deactivate, and HTTP endpoints for runtime read and admin updates.
  In Games-Labs-Missions, I added a wallet rate-catalog client and a feature-flagged (`USE_WALLET_RATE_CATALOG`) exchange-flow integration so exchange values can be sourced from Wallet by `rate_key` while preserving existing behavior as fallback.
  In Games-Labs-Order, I added wallet adapter/port/model support for rate lookups and integrated the same feature flag into coin reward calculation to consume centralized exchange rates when enabled, with legacy package values retained as fallback if unavailable.
  Updated tests and constructor wiring to keep all touched services green.
