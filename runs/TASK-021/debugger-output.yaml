summary: |
  Reviewer blockers were all caused by missing test coverage, not by broken implementation. The Wallet rate catalog endpoints, Missions wallet-catalog exchange path, and Order wallet-catalog reward override path were already wired correctly, but there were no tests proving those code paths worked when enabled.

  I applied a test-only fix in three places:
  - Extended the Wallet handler test stub so rate-catalog methods can be exercised, then added 4 HTTP handler tests covering list, get-by-key, upsert, and deactivate success paths.
  - Added a Missions store-service test that enables wallet rate catalog lookup, serves a fake wallet catalog response for `exchange.ex_5`, and verifies both the resulting exchange output and the wallet debit/credit payloads.
  - Added an Order service test that enables the wallet rate catalog path and verifies `ConfirmPayment` uses the catalog `Numerator` instead of the package snapshot `RewardCoins` when calculating the wallet reward.

  Verification:
  - `go test ./internal/core/handlers/wallethdl` in Games-Labs-Wallet passed.
  - `go test ./internal/services` in Games-Labs-Missions passed.
  - `go test ./internal/core/services/ordersvc` in Games-Labs-Order passed.
