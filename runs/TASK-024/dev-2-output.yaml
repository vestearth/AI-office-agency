summary: |
  Implemented dynamic, catalog-validated redemption in Games-Labs-Missions and removed the hardcoded reward path. The redeem flow now normalizes reward selection input with backward-compatible fallback from legacy `reward_type`, validates active reward keys before deduction, enforces Phase 1 external voucher payload requirements (`voucher_code`, `campaign_id`, `provider`, `voucher_price`, RFC3339 `expires_at`, and object/string `condition`), and returns normalized voucher assignment metadata plus assignment outcome.

  I also wired temporary privilege rewards to `StoreService.GrantPass` using catalog metadata (`pass_type`, `duration_days`) after successful wallet deduction, while keeping replay behavior idempotent per user+reward+idempotency key so deductions and fulfillment do not duplicate. The handler now uses `X-User-ID` as the authoritative identity, prefers `Idempotency-Key` over body fallback, and preserves wallet error mapping with 402 for insufficient points and 503 for wallet unavailability. As a small supporting deviation, I added a minimal `go.mod` so this extracted Missions slice builds and tests cleanly.
