task_id: TASK-PKG-003
phase: planned
iteration: 1

summary: |
  Implement dedicated Admin Package CRUD APIs in Games-Labs-Order. Currently, package
  mutation (PUT/DELETE) is exposed on the public orderhdl handler without any RBAC.
  This task moves admin operations to a dedicated handler with auth middleware, adds
  a new adminorderpb.proto for gRPC admin access, and ensures user-facing APIs only
  expose read-only endpoints with time-window filtering.

  DEPENDENCY: Requires TASK-003 (schema extension) to be completed first, as admin
  APIs need to handle new fields (effective_at, expires_at, metadata, code).

plan:
  approach: |
    1. Create adminorderpb.proto in shared-lib for gRPC admin package management.
    2. Implement adminorderhdl HTTP handlers with RBAC middleware (role check from
       auth header/gRPC metadata via shared-lib/pkg/auth).
    3. Move PUT/DELETE logic from orderhdl/http.go PackageByIDHTTP to adminorderhdl.
    4. Strip PUT/DELETE from orderhdl — user-facing should only GET packages.
    5. Wire up admin routes in cmd/main.go with auth middleware.

  affected_services:
    - service: shared-lib
      reason: New adminorderpb.proto for gRPC admin package management
    - service: Games-Labs-Order
      reason: New admin handler, refactored public handler, updated routing
    - service: api-gateway
      reason: May need new route entries for admin package endpoints (verify existing config)

  affected_files:
    - path: shared-lib/proto/admin/adminorderpb/adminorderpb.proto
      action: create
      description: |
        Define AdminOrderService with RPCs:
        - CreatePackage(CreatePackageRequest) returns (PackageResponse)
        - UpdatePackage(UpdatePackageRequest) returns (PackageResponse)
        - GetPackage(GetPackageRequest) returns (PackageResponse)
        - ListPackages(ListPackagesRequest) returns (ListPackagesResponse) — admin version, no time filter
        - DeletePackage(DeletePackageRequest) returns (basepb.Response) — soft delete (set active=false)
        All with grpc-gateway HTTP annotations under /api/v1/admin/order-packages.

    - path: shared-lib/proto/admin/adminorderpb/adminorderpb.pb.go
      action: create
      description: Generated by buf generate

    - path: shared-lib/proto/admin/adminorderpb/adminorderpb_grpc.pb.go
      action: create
      description: Generated by buf generate

    - path: shared-lib/proto/admin/adminorderpb/adminorderpb.pb.gw.go
      action: create
      description: Generated by buf generate

    - path: shared-lib/proto/admin/adminorderpb/swagger.pb.go
      action: create
      description: Generated by make buf (swagtxt.go)

    - path: Games-Labs-Order/internal/core/handlers/adminorderhdl/adminorderhdl.go
      action: modify
      description: |
        Implement AdminHandler struct with dependency on ports.OrderService.
        HTTP methods:
        - CreatePackageHTTP (POST /api/v1/admin/order-packages)
        - UpdatePackageHTTP (PUT /api/v1/admin/order-packages/{id})
        - GetPackageHTTP (GET /api/v1/admin/order-packages/{id})
        - ListPackagesHTTP (GET /api/v1/admin/order-packages) — passes IsAdmin=true
        - DeletePackageHTTP (DELETE /api/v1/admin/order-packages/{id}) — soft delete
        gRPC methods: Implement AdminOrderServiceServer interface.

    - path: Games-Labs-Order/internal/core/handlers/orderhdl/http.go
      action: modify
      description: |
        Remove PUT and DELETE cases from PackageByIDHTTP — keep only GET.
        User-facing ListPackagesHTTP should pass IsAdmin=false to service
        (which applies time-window filter after TASK-003 is complete).

    - path: Games-Labs-Order/cmd/main.go
      action: modify
      description: |
        Register admin HTTP routes under /api/v1/admin/order-packages with auth middleware.
        Register AdminOrderServiceServer on the gRPC server.
        Wire adminorderhdl with same OrderService instance.

  subtasks:
    - order: 1
      description: |
        Create shared-lib/proto/admin/adminorderpb/adminorderpb.proto with
        AdminOrderService definition. Include all 5 RPCs with HTTP annotations.
        Package message should include all OrderPackage fields (including new ones
        from TASK-003: effective_at, expires_at, metadata, code).
        Run `make buf` in shared-lib to generate Go code.
      agent: dev

    - order: 2
      description: |
        Implement adminorderhdl.go:
        - AdminHandler struct holding ports.OrderService
        - NewAdminHandler constructor
        - HTTP handlers for Create, Update, Get, List (IsAdmin=true), Delete (soft)
        - gRPC handler implementing AdminOrderServiceServer
        - Use shared-lib/pkg/auth to read role from request context/metadata
        - Reject requests without admin role
      agent: dev

    - order: 3
      description: |
        Refactor orderhdl/http.go PackageByIDHTTP:
        - Remove PUT case (moved to admin)
        - Remove DELETE case (moved to admin)
        - Keep only GET for user-facing package detail
        Ensure ListPackagesHTTP sets IsAdmin=false in filter.
      agent: dev

    - order: 4
      description: |
        Update cmd/main.go:
        - Import adminorderhdl package
        - Create AdminHandler instance with same OrderService
        - Register admin HTTP routes with auth/role middleware
        - Register gRPC AdminOrderServiceServer
      agent: dev

    - order: 5
      description: |
        Verify api-gateway configuration handles /api/v1/admin/order-packages routes.
        Check if api-gateway has route config that needs updating, or if it proxies
        all /api/v1/ paths to the order service automatically.
      agent: dev

  risks:
    - risk: TASK-003 must complete first — admin handler needs new model fields
      mitigation: Dev should implement against the post-TASK-003 model; can stub fields if parallel work needed
    - risk: Existing clients calling PUT/DELETE on /api/v1/order-packages/{id} will break
      mitigation: This is intentional — admin ops should only go through /api/v1/admin/ endpoints
    - risk: No existing RBAC middleware pattern in Games-Labs-Order
      mitigation: Use shared-lib/pkg/auth.go which reads role from gRPC metadata; for HTTP add middleware checking Authorization header via Games-Labs-Auth adapter
    - risk: adminorderpb go_package path must match directory structure (proto/admin/adminorderpb)
      mitigation: Follow existing pattern from adminuserpb — same folder structure under proto/admin/

  estimated_complexity: medium

artifacts:
  - path: runs/TASK-PKG-003/planner-output.yaml
    action: created

next_action:
  agent: dev
  reason: Plan is ready; dev should start after TASK-003 is complete (dependency)

blockers:
  - "TASK-003 (schema extension) must be completed first — admin CRUD needs the new model fields"
