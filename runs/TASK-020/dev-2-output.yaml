summary: |
  Implemented TASK-020 compensation flow with deterministic idempotency and Wallet-side redemption-reference validation.
  In shared-lib, I extended `walletpb` with `RefundPoints` request/response + HTTP mapping and regenerated protobuf/gateway/swagger artifacts.
  In Games-Labs-Wallet, I added `RefundPoints` service/repository support and an HTTP endpoint (`/wallets/refund-points`) that is idempotent, validates `reference_redemption_id` against a prior successful `redeem_points` ledger record, and prevents over-credit on duplicate compensation keys.
  In Games-Labs-Order, I implemented saga compensation in `CreateRewardOrder`: redeem points first, then create order, and if order creation fails call Wallet refund with deterministic keys:
  `redeem:order:reward:<user_id>:<business_ref>` and `refund:order:reward:<user_id>:<business_ref>`.
  Added structured lifecycle logs for success/failure/compensation-failure categories and tests for compensation key/reference behavior.
  Also documented a reconciliation SQL query in Wallet README to identify unresolved redemptions.
