blockers:
  - id: B1
    severity: advisory
    description: >
      No test covers the ErrInvalidRedemptionRef -> HTTP 400 path in
      TestRefundPointsHTTP*. Handler branch is simple; missing test is
      advisory only.
    recommended_action: >
      Add TestRefundPointsHTTPHandlerInvalidRef in a follow-up; not blocking
      this task.
  - id: B2
    severity: error
    description: >
      Wallet gRPC server does not register the RefundPoints handler. The
      generated server interface in wallet_grpc.pb.go includes RefundPoints
      but the Wallet service implementation has not wired it to the gRPC
      server because the pinned shared-lib pseudo-version pre-dates the new
      generated symbols. Module bump required before gRPC handler can be wired.
    recommended_action: >
      DevOps: publish/pin a shared-lib pseudo-version that includes the new
      walletpb RefundPoints symbols, bump Games-Labs-Wallet go.mod, then wire
      server method. HTTP path is fully operational in the meantime.

next_action:
  agent: devops
  reason: >
    Logic is correct and HTTP compensation flow is production-ready. The only
    remaining work is a shared-lib module version bump so the Wallet gRPC
    server can bind the RefundPoints handler. This is a pure DevOps / module
    management task.

