blockers:
  - id: B2-infra
    severity: advisory
    description: >
      gRPC RefundPoints server binding cannot be compiled until shared-lib is
      published to the private registry at a commit including the generated
      walletpb.RefundPointsRequest / RefundPointsResponse types. DevOps confirmed
      authentication to the private module registry is unavailable in the local
      environment. go.mod was partially bumped (7a1be8693574) but still predates
      the proto generation. gRPC wiring requires: (1) publish shared-lib to registry
      at RefundPoints-containing commit, (2) go get bump in Games-Labs-Wallet,
      (3) add grpcHandler.RefundPoints method to grpc.go following RedeemPoints
      pattern, (4) rebuild and test. HTTP path is unaffected and fully operational.
    recommended_action: >
      Track as a CI/CD follow-up — wire in grpc.go once shared-lib is published.
      Implementation pattern is clear (mirrors RedeemPoints handler).

