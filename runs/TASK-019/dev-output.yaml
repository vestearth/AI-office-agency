summary: |
  Refactored Missions level redemption to enforce service ownership boundaries: redeeming points now delegates to Wallet's `/wallets/redeem` API and no longer mutates Missions progression fields (`points`, `total_points`, level state). Added explicit progression naming in level responses (`progress_points`, `lifetime_progress_points`) while preserving legacy aliases for compatibility, and introduced focused regression tests proving redemption leaves progression unchanged and turnover progression does not call wallet mutation endpoints.
