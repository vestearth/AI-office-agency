$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://sparqlab.local/ai-dev-office/schemas/task.schema.yaml"
title: AI Dev Office Structured Task Schema
description: >
  Schema for the structured task payload emitted by PM in `pm-output.yaml`.
  This is the machine-readable task blueprint that complements the human-facing
  `runs/<task-id>/task.md`.
type: object
additionalProperties: false
required:
  - task
  - scope
  - description
  - acceptance_criteria
  - plan
  - assignment
  - summary
  - artifacts
  - next_action
  - blockers
properties:
  task:
    type: object
    additionalProperties: false
    required:
      - id
      - title
      - type
      - priority
      - created_at
    properties:
      id:
        type: string
        pattern: "^TASK(?:-PKG)?-[0-9]+$"
      title:
        type: string
      type:
        type: string
        enum:
          - feature
          - bugfix
          - refactor
          - investigation
          - devops
      priority:
        type: string
        enum:
          - low
          - medium
          - high
          - critical
      created_at:
        type: string
  scope:
    type: object
    additionalProperties: false
    required:
      - target_services
      - affected_files
    properties:
      target_services:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - service
            - reason
          properties:
            service:
              type: string
            reason:
              type: string
      affected_files:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - path
            - action
            - description
          properties:
            path:
              type: string
            action:
              type: string
              enum:
                - create
                - modify
                - delete
            description:
              type: string
  description:
    type: string
  acceptance_criteria:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - criterion
      properties:
        criterion:
          type: string
  plan:
    type: object
    additionalProperties: false
    required:
      - approach
      - subtasks
      - risks
      - estimated_complexity
    properties:
      approach:
        type: string
      subtasks:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
            - order
            - description
            - agent
          properties:
            order:
              type: integer
              minimum: 1
            description:
              type: string
            agent:
              type: string
              enum:
                - dev
                - dev-2
      risks:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - risk
            - mitigation
          properties:
            risk:
              type: string
            mitigation:
              type: string
      estimated_complexity:
        type: string
        enum:
          - low
          - medium
          - high
  assignment:
    type: object
    additionalProperties: false
    required:
      - primary
      - parallel
      - reason
    properties:
      primary:
        type: string
        enum:
          - dev
          - dev-2
      parallel:
        type: boolean
      reason:
        type: string
  summary:
    type: string
  artifacts:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - path
        - action
      properties:
        path:
          type: string
        action:
          type: string
          enum:
            - created
            - modified
            - deleted
  next_action:
    type: object
    additionalProperties: false
    required:
      - agent
      - reason
    properties:
      agent:
        type: string
        enum:
          - dev
          - dev-2
          - free-roam
      reason:
        type: string
  blockers:
    type: array
    items:
      type: string
