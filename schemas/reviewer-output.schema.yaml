$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://sparqlab.local/ai-dev-office/schemas/reviewer-output.schema.yaml"
title: AI Dev Office Reviewer Output Schema
description: >
  Agent-specific schema for `reviewer-output.yaml`. Extends the base handoff
  contract with review verdict and build/test verification.
type: object
allOf:
  - $ref: "./agent-output.schema.yaml"
required:
  - review_verdict
  - build_check
properties:
  review_verdict:
    type: string
    enum:
      - approved
      - changes_requested
      - escalate
      - infra_failure
  build_check:
    type: object
    additionalProperties: false
    required:
      - compile
      - tests
      - details
    properties:
      compile:
        type: string
        enum:
          - pass
          - fail
          - skipped
      tests:
        type: string
        enum:
          - pass
          - fail
          - skipped
      details:
        type: string
  transition:
    type: object
    additionalProperties: false
    required:
      - from_phase
      - to_phase
    properties:
      from_phase:
        type: string
        const: review
      to_phase:
        type: string
        enum:
          - done
          - debugging
          - escalated
          - devops_needed
