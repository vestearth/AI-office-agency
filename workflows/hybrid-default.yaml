workflow:
  name: hybrid-default
  version: "2.0"
  description: |
    Hybrid orchestration flow with PM-driven task creation,
    Dev/Dev-2 implementation, Reviewer approval (with build+test),
    DevOps for infra, and Free Roam for escalation.

# ─── Primary Pipeline ───────────────────────────────────────────────
# User Request -> PM -> Dev/Dev-2 -> Reviewer -> Done
#
# ─── Parallel Pipeline (when PM splits subtasks) ────────────────────
# PM splits -> Dev (subtask A) + Dev-2 (subtask B) -> Reviewer
#
# ─── Error Paths ────────────────────────────────────────────────────
# Reviewer rejects     -> Debugger -> Reviewer or Dev/Dev-2 (retry)
# Reviewer infra fail  -> DevOps -> Reviewer (retry)
# Ambiguous/stuck      -> FreeRoam -> Dev/Dev-2 (reroute)
# PM unclear request   -> FreeRoam (clarify scope)

stages:
  - id: pm
    agent: pm
    entry_conditions:
      - phase: pending
    on_complete:
      routes:
        - result: task_ready
          next: dev
          set_phase: assigned
        - result: task_ready_parallel
          next: dev
          set_phase: assigned_parallel
        - result: unclear_request
          next: free-roam
          set_phase: escalated

  - id: dev
    agent: dev
    alternates: [dev-2]
    entry_conditions:
      - phase: assigned
      - phase: assigned_parallel
      - phase: debugging_complete
      - phase: free_roam_complete
      - phase: devops_complete
    on_complete:
      next: reviewer
      set_phase: review
    parallel_mode:
      description: |
        When PM assigns subtasks to both dev and dev-2, the orchestrator
        runs them in parallel on separate subtasks. Both feed into the
        same reviewer stage once complete.
      assign_by: PM subtask assignment

  - id: reviewer
    agent: reviewer
    entry_conditions:
      - phase: review
    on_complete:
      routes:
        - verdict: approved
          next: done
          set_phase: done
        - verdict: changes_requested
          next: debugger
          set_phase: debugging
        - verdict: escalate
          next: free-roam
          set_phase: escalated
        - verdict: infra_failure
          next: devops
          set_phase: devops_needed

  - id: debugger
    agent: debugger
    entry_conditions:
      - phase: debugging
    on_complete:
      routes:
        - next_action_agent: reviewer
          confidence: [high, medium]
          next: reviewer
          set_phase: review
        - next_action_agent: [dev, dev-2]
          confidence: [high, medium]
          next: dynamic
          set_phase: debugging_complete
        - next_action_agent: free-roam
          next: free-roam
          set_phase: escalated
        - confidence: [low]
          next: free-roam
          set_phase: escalated

  - id: devops
    agent: devops
    entry_conditions:
      - phase: devops_needed
    on_complete:
      routes:
        - result: fixed
          next: reviewer
          set_phase: review
        - result: code_issue
          next: dev
          set_phase: devops_complete
        - result: stuck
          next: free-roam
          set_phase: escalated

  - id: free-roam
    agent: free-roam
    entry_conditions:
      - phase: escalated
    on_complete:
      routes:
        - action: fix
          next: dev
          set_phase: free_roam_complete
        - action: split
          next: pm
          set_phase: pending
        - action: reroute
          next: dynamic
          set_phase: free_roam_complete
        - action: abort
          next: done
          set_phase: aborted

  - id: done
    terminal: true

escalation_rules:
  loop_detection:
    max_iterations: 5
    count_field: status.yaml -> iteration
    on_exceeded:
      next: free-roam
      set_phase: escalated
      inject_blocker: "Loop guard triggered: exceeded max_iterations"

  conflicting_agents:
    description: |
      When reviewer and debugger produce contradictory conclusions
      on the same blocker within 2 consecutive iterations.
    detection: status.yaml -> history[-2:] conflicting root_cause
    on_detected:
      next: free-roam
      set_phase: escalated
      inject_blocker: "Conflicting agent conclusions detected"

runner_switch:
  on_runner_failure:
    check_patterns: office.config.yaml -> runner_selector.trigger_patterns
    action:
      persist_state: true
      switch_to: fallback
      log_to: runs/<task-id>/meta.yaml
      resume_from: current_stage

orchestrator_behavior:
  read_status: runs/<task-id>/status.yaml
  update_status_after_each_stage: true
  log_transitions: runs/<task-id>/meta.yaml
  prompt_assembly:
    include:
      - runs/<task-id>/task.md
      - runs/<task-id>/status.yaml
      - agents/<agent-id>.md
    include_if_exists:
      - runs/<task-id>/pm-output.yaml
    inject_all_dev_outputs: true
    inject_blockers_from: previous_agent_output
