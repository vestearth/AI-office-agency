office:
  name: AI Dev Office
  version: "1.0"

agents:
  - id: planner
    prompt: agents/planner.md
    description: Analyzes tasks and creates technical implementation plans before coding
  - id: dev
    prompt: agents/dev.md
    description: Writes and modifies code based on task requirements
  - id: dev-2
    prompt: agents/dev-2.md
    description: Senior Dev for parallel subtasks or complex implementations
  - id: reviewer
    prompt: agents/reviewer.md
    description: Reviews code quality, standards, and correctness
  - id: debugger
    prompt: agents/debugger.md
    description: Investigates root causes of failures and fixes them
  - id: tester
    prompt: agents/tester.md
    description: Runs tests and validates behavior
  - id: free-roam
    prompt: agents/free-roam.md
    description: Senior-level agent that handles ambiguous, complex, or stuck situations

default_workflow: workflows/hybrid-default.yaml

runner_selector:
  primary: codex
  fallback: copilot
  config_dir: runners/
  auto_switch: true
  trigger_patterns:
    - "insufficient_quota"
    - "quota exceeded"
    - "rate limit"
    - "unauthorized"
    - "invalid api key"
    - "token expired"
  retry_before_switch: 2
  log_switch_reason: true

handoff_contract:
  required_fields:
    - summary
    - artifacts
    - next_action
    - blockers
  state_files:
    task: task.md
    status: status.yaml
    meta: meta.yaml

loop_guard:
  max_iterations: 5
  escalate_to: free-roam
