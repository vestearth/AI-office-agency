office:
  name: AI Dev Office
  version: "2.0"

agents:
  - id: pm
    prompt: agents/pm.md
    description: Creates tasks, plans implementation, and assigns work to Dev agents
  - id: dev
    prompt: agents/dev.md
    description: Writes and modifies code based on task requirements
  - id: dev-2
    prompt: agents/dev-2.md
    description: Senior Dev for complex, cross-cutting, or multi-service implementations
  - id: reviewer
    prompt: agents/reviewer.md
    description: Reviews code quality, runs tests, and approves or rejects changes
  - id: debugger
    prompt: agents/debugger.md
    description: Investigates root causes of failures and fixes them
  - id: devops
    prompt: agents/devops.md
    description: Manages Docker, CI/CD, deployment, and infrastructure concerns
  - id: free-roam
    prompt: agents/free-roam.md
    description: Senior-level agent that handles ambiguous, complex, or stuck situations

default_workflow: workflows/hybrid-default.yaml

runner_selector:
  priority:
    - copilot         # 1st: GitHub Copilot CLI
    - cursor-agent    # 2nd: Cursor CLI Agent
    - cursor          # 3rd: Cursor IDE (interactive)
    - codex           # 4th: Codex CLI
  config_dir: runners/
  auto_switch: true
  trigger_patterns:
    - "insufficient_quota"
    - "quota exceeded"
    - "rate limit"
    - "unauthorized"
    - "invalid api key"
    - "token expired"
  retry_before_switch: 2
  log_switch_reason: true

handoff_contract:
  required_fields:
    - summary
    - artifacts
    - next_action
    - blockers
  state_files:
    task: task.md
    status: status.yaml
    meta: meta.yaml

state_model:
  source_of_truth: status.yaml
  audit_log: meta.yaml
  phase_state_must_match: true
  phases:
    - pending
    - blocked
    - assigned
    - assigned_parallel
    - review
    - in_review
    - debugging
    - debugging_complete
    - devops_needed
    - devops_complete
    - escalated
    - free_roam_complete
    - done
    - aborted
  reviewer_queue_phase: in_review

dependency_policy:
  machine_readable_fields:
    blocked_on: status.yaml
    waiting_for: status.yaml
    ready: status.yaml
  blocked_dispatch_guard: true
  enforce_current_agent_route: true
  auto_reconcile_before_dispatch: true
  unblock_when_upstream_phase: done
  on_unblock:
    clear_waiting_for: true
    set_ready: true
    route_from_assignment_primary: true

dependency_guard:
  enabled: true
  script: scripts/check-service-dependencies.sh

loop_guard:
  max_iterations: 8
  escalate_to: free-roam
